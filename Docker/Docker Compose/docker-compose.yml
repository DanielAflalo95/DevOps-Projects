networks:
  app_net:
    driver: bridge

services:
  python_app:
    build: .
    ports:
      - "5000:5000"
    networks:
      - app_net
    #Service will only start after completion of dependencies
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
    volumes:
      - ./appdata/postgres:/var/lib/postgresql/data
    networks:
      - app_net
    restart: always